    <text x="326" y="644" fill="#FFFFFF" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="34" font-weight="800">ROI</text>
    <text x="326" y="674" fill="#C8D3E0" font-family="'Outfit', Arial, sans-serif" font-size="20">Tráfico con intención</text>

