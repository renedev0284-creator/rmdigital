    <text x="604" y="368" fill="#FFFFFF" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="20" font-weight="800">WhatsApp</text>
    <text x="604" y="395" fill="#D1DCEA" font-family="'Outfit', Arial, sans-serif" font-size="16">CTA visible</text>

    <rect x="586" y="430" width="120" height="96" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
