<svg xmlns="http://www.w3.org/2000/svg" width="860" height="980" viewBox="0 0 860 980" role="img" aria-labelledby="title desc">
  <title id="title">RM Digital Hero Showcase</title>
  <desc id="desc">Mockup visual para el hero de RM Digital con interfaz web y movil.</desc>
  <defs>
    <linearGradient id="bg" x1="12%" y1="8%" x2="88%" y2="92%">
      <stop offset="0%" stop-color="#0F233A"/>
      <stop offset="55%" stop-color="#18314C"/>
      <stop offset="100%" stop-color="#0A1624"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#FFD27A"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="32" stdDeviation="28" flood-color="#02060A" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="860" height="980" rx="52" fill="url(#bg)"/>
