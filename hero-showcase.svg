    <circle cx="144" cy="831" r="14" fill="#F5A623"/>
    <text x="176" y="826" fill="#FFFFFF" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="22" font-weight="800">Más claridad visual</text>
    <text x="176" y="853" fill="#D1DCEA" font-family="'Outfit', Arial, sans-serif" font-size="18">Jerarquía y confianza</text>
