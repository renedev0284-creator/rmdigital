    <text x="498" y="598" fill="#F4B13E" font-family="'Outfit', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">CRM</text>
    <text x="498" y="644" fill="#FFFFFF" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="34" font-weight="800">24/7</text>
    <text x="498" y="674" fill="#C8D3E0" font-family="'Outfit', Arial, sans-serif" font-size="20">Seguimiento</text>
