    <text x="130" y="344" fill="#FFFFFF" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="56" font-weight="800">actual, claro y listo para</text>
    <text x="130" y="410" fill="#FFC966" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="56" font-weight="800">convertir visitas en ventas</text>

