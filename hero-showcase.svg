    <text x="604" y="516" fill="#D1DCEA" font-family="'Outfit', Arial, sans-serif" font-size="16">claros</text>

    <rect x="586" y="544" width="120" height="112" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
    <text x="604" y="580" fill="#FFFFFF" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="20" font-weight="800">Embudo</text>
    <text x="604" y="608" fill="#D1DCEA" font-family="'Outfit', Arial, sans-serif" font-size="16">Cada scroll</text>
    <text x="604" y="630" fill="#D1DCEA" font-family="'Outfit', Arial, sans-serif" font-size="16">lleva a la acción</text>
  </g>

